<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Master Brain</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login" class="login-screen">
    <form id="login-form">
      <h1>The Master Brain</h1>
      <input id="login-key" type="password" placeholder="Panel API key" autocomplete="off" />
      <button type="submit">Enter</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <div id="app" class="hidden">
    <header>
      <h1>The Master Brain</h1>
      <div class="status-pills">
        <span id="status-pc" class="pill">PC</span>
        <span id="status-vps" class="pill">VPS</span>
        <button id="logout" class="link-btn">Log out</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="files">Files</button>
      <button class="tab-btn" data-tab="sync">Sync</button>
    </nav>

    <section id="tab-files" class="tab-panel active">
      <div class="toolbar">
        <select id="node-select">
          <option value="pc">PC</option>
          <option value="vps">VPS</option>
        </select>
        <span id="breadcrumb" class="breadcrumb"></span>
        <span class="spacer"></span>
        <input id="new-name" placeholder="new-file.txt or folder/" />
        <button id="new-file-btn">+ File</button>
        <button id="new-folder-btn">+ Folder</button>
      </div>
      <div class="files-layout">
        <ul id="file-list" class="file-list"></ul>
        <div id="editor" class="editor hidden">
          <div class="editor-toolbar">
            <span id="editor-path"></span>
            <span class="spacer"></span>
            <button id="save-file-btn">Save</button>
            <button id="delete-file-btn" class="danger">Delete</button>
          </div>
          <textarea id="editor-content" spellcheck="false"></textarea>
        </div>
      </div>
    </section>

    <section id="tab-sync" class="tab-panel">
      <div class="sync-summary">
        <button id="sync-now-btn">Sync now</button>
        <span id="sync-status-text"></span>
      </div>

      <h2>Config</h2>
      <form id="config-form" class="config-form">
        <label>Direction
          <select id="cfg-direction">
            <option value="two-way">Two-way</option>
            <option value="pc-to-vps">PC &rarr; VPS only</option>
            <option value="vps-to-pc">VPS &rarr; PC only</option>
          </select>
        </label>
        <label>Auto-sync interval (minutes, 0 = off)
          <input id="cfg-interval" type="number" min="0" />
        </label>
        <label>Include patterns (one per line)
          <textarea id="cfg-include" rows="3"></textarea>
        </label>
        <label>Exclude patterns (one per line)
          <textarea id="cfg-exclude" rows="3"></textarea>
        </label>
        <button type="submit">Save config</button>
      </form>

      <h2>History</h2>
      <table id="history-table">
        <thead>
          <tr><th>Time</th><th>Op</th><th>Path</th><th>Direction</th><th>Result</th></tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
