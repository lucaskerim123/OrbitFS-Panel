name: Apply phone-first panel fixes

on:
  push:
    branches:
      - mobile/phone-first-real-ui

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile/phone-first-real-ui
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply focused mobile patch
        run: node scripts/apply-phone-first-ui.mjs
      - name: Verify browser scripts
        run: |
          node --check public/app.js
          node --check public/permissions.js
          node --check public/docx-viewer.js
          node --check public/startup-settings.js
      - name: Commit generated fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/system-compact.css public/startup-settings.css public/startup-settings.js
          git diff --cached --quiet || git commit -m "Apply phone-first real UI fixes"
          git push
